name: Android Production Build Optimizer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # CRITICAL: Maps all run commands to the nested Flutter directory
    defaults:
      run:
        working-directory: ./mcluke_system

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install Project Dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Enable Aggressive R8/Proguard Optimization
        run: |
          cd android
          # Forces gradle to run aggressive minification and resource stripping
          sed -i 's/minifyEnabled false/minifyEnabled true/g' app/build.gradle
          if ! grep -q "shrinkResources" app/build.gradle; then
            sed -i '/minifyEnabled true/a \        shrinkResources true' app/build.gradle
          fi

      - name: Build Optimized Production App Bundle (.aab)
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Build Split Target APKs for Internal Testing
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/app/outputs/symbols

      # Note: Upload steps run from the repo root, so we prepend the directory name to the paths
      - name: Upload Production App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mcluke-system-production-aab
          path: mcluke_system/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Upload Split APKs (Smallest Target APK)
        uses: actions/upload-artifact@v4
        with:
          name: mcluke-system-split-apks
          path: mcluke_system/build/app/outputs/apk/release/*.apk
          retention-days: 7
