name: Android Production Build Optimizer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./mcluke_system

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install Project Dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      # FIXED: Removed the dangerous sed script and obfuscation flags that break Injectable/Hive
      - name: Build Stable Production App Bundle (.aab)
        run: flutter build appbundle --release

      - name: Build Split Target APKs for Internal Testing
        run: flutter build apk --release --split-per-abi

      - name: Report bundle & APK sizes
        run: |
          du -sh build/app/outputs/bundle/release/app-release.aab || true
          ls -lh build/app/outputs/apk/release/*.apk || true
          for f in build/app/outputs/apk/release/*.apk; do echo "$f"; zipinfo -t "$f" || true; done

      - name: Upload Production App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mcluke-system-production-aab
          path: mcluke_system/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Upload Split APKs (Smallest Target APK)
        uses: actions/upload-artifact@v4
        with:
          name: mcluke-system-split-apks
          path: mcluke_system/build/app/outputs/apk/release/*.apk
          retention-days: 7